name: HAKAI QA – Deterministik Test & Otomatik Düzeltme

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
  schedule:
    # Her gün 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  hakai-qa:
    name: HAKAI 50-Soru QA + Auto-Fix
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # ── 1. Kaynak kodu al ─────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # commit + push için tam history
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Node.js kur ───────────────────────────────────────────
      - name: Node.js 18 kur
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      # ── 3. Bağımlılıkları yükle ──────────────────────────────────
      - name: npm ci
        working-directory: server
        run: npm ci

      # ── 4. QA suite çalıştır ─────────────────────────────────────
      - name: QA runner (50 deterministik soru)
        id: qa_run
        working-directory: server
        continue-on-error: true   # başarısız olsa bile sonraki adımlar çalışsın
        run: node tests/hakai_qa_runner.mjs
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      # ── 5. Başarısız testler varsa auto-fix çalıştır ─────────────
      - name: Auto-fix agent
        id: auto_fix
        if: steps.qa_run.outcome == 'failure'
        working-directory: server
        continue-on-error: true
        run: node tests/auto_fix_agent.mjs
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      # ── 6. Düzeltme sonrası tekrar test et ───────────────────────
      - name: Doğrulama testi (fix sonrası)
        id: qa_verify
        if: steps.auto_fix.outcome != 'skipped'
        working-directory: server
        continue-on-error: true
        run: node tests/hakai_qa_runner.mjs
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      # ── 7. Değişiklikleri commit et ──────────────────────────────
      - name: Değişiklikleri commit et ve push yap
        if: always()
        working-directory: server
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "HAKAI QA Bot"
          git config user.email "qa-bot@hakai.local"
          git remote set-url origin \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"

          # QA raporu + fix logu + KB değişiklikleri
          git add tests/hakai_qa_report.json 2>/dev/null || true
          git add tests/hakai_qa_fix_log.json 2>/dev/null || true
          git add data/ilmihal/*.json 2>/dev/null || true

          if ! git diff --cached --quiet; then
            # Rapor özeti için pass oranını oku
            PASS_RATE=$(node -e "
              try {
                const r = require('./tests/hakai_qa_report.json');
                console.log(r.pass_rate + ' (' + r.passed + '/' + r.total + ')');
              } catch { console.log('?'); }
            " 2>/dev/null || echo "?")

            git commit \
              -m "🤖 QA Auto-Fix: ${PASS_RATE} [skip ci]" \
              -m "Tetikleyici: ${{ github.event_name }} @ ${{ github.sha }}" \
              -m "HAKAI deterministik QA suite otomatik güncelleme."
            git pull --rebase origin main
            git push origin HEAD:main
            echo "✅ Değişiklikler push edildi"
          else
            echo "ℹ️  Commit edilecek değişiklik yok"
          fi

      # ── 8. Özet rapor ────────────────────────────────────────────
      - name: GitHub Step Summary
        if: always()
        working-directory: server
        run: |
          node -e "
            const fs = require('fs');
            try {
              const r = JSON.parse(fs.readFileSync('tests/hakai_qa_report.json', 'utf8'));
              const icon = r.failed === 0 && r.errors === 0 ? '✅' : '❌';
              let md = '## ' + icon + ' HAKAI QA Sonuçları\n\n';
              md += '| Toplam | Geçti | Başarısız | Hata | Başarı Oranı |\n';
              md += '|--------|-------|-----------|------|--------------|\n';
              md += '| ' + r.total + ' | ' + r.passed + ' | ' + r.failed + ' | ' + r.errors + ' | **' + r.pass_rate + '** |\n\n';

              const failing = r.results.filter(x => x.status !== 'pass');
              if (failing.length > 0) {
                md += '### Başarısız Testler\n\n';
                failing.forEach(t => {
                  md += '- **' + t.id + '**: ' + t.question + '\n';
                  t.checks.filter(c => !c.pass).forEach(c => {
                    md += '  - \`' + c.type + '\`: ' + c.detail + '\n';
                  });
                });
              }

              md += '\n_Tarih: ' + r.generated_at + '_\n';
              fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY || '/dev/null', md);
              console.log(md);
            } catch(e) {
              console.log('Rapor okunamadı:', e.message);
            }
          "

      # ── 9. Artifact yükle ────────────────────────────────────────
      - name: Raporu artifact olarak yükle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hakai-qa-report-${{ github.run_number }}
          path: |
            server/tests/hakai_qa_report.json
            server/tests/hakai_qa_fix_log.json
          retention-days: 30

      # ── 10. Kritik hata varsa workflow'u başarısız yap ───────────
      - name: Sonuç kontrolü
        if: always()
        working-directory: server
        run: |
          node -e "
            const r = JSON.parse(require('fs').readFileSync('tests/hakai_qa_report.json','utf8'));
            const kb_failures = r.results.filter(x =>
              x.status !== 'pass' &&
              x.checks.some(c => !c.pass && ['kb_hit','no_safety_block','no_redirect_to_ilmihal'].includes(c.type))
            );
            if (kb_failures.length > 0) {
              console.error('KRİTİK: ' + kb_failures.length + ' kritik test hâlâ başarısız');
              kb_failures.forEach(t => console.error('  ✗ ' + t.id + ': ' + t.question));
              process.exit(1);
            }
            console.log('Kritik testler geçiyor ✓');
          " 2>/dev/null || true
