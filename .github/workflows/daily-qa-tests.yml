name: Daily QA Tests - Generated Questions

on:
  schedule:
    # Run at 2 AM, 10 AM, and 6 PM UTC (3x daily)
    - cron: '0 2,10,18 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  qa-tests:
    name: Semantic Matching QA with Generated Questions
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        working-directory: server
        run: npm ci

      - name: Generate random test questions
        working-directory: server
        timeout-minutes: 5
        run: node question-generator.js
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Start backend server
        working-directory: server
        timeout-minutes: 5
        run: |
          npm start > server.log 2>&1 &
          echo $! > server.pid

          for i in {1..30}; do
            if curl -s http://localhost:3000/health > /dev/null 2>&1; then
              echo "✅ Server is ready"
              break
            fi
            echo "⏳ Waiting for server... ($i/30)"
            sleep 1
          done

      - name: Run QA test suite
        working-directory: server
        timeout-minutes: 20
        run: node test-suite.js
        env:
          BACKEND_URL: 'http://localhost:3000'

      - name: Analyze test results
        working-directory: server
        timeout-minutes: 5
        if: always()
        run: node question-analyzer.js
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Run auto-fix analysis (critical issues only)
        working-directory: server
        timeout-minutes: 5
        if: always()
        run: node auto-fix.js
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Validate KB coverage (find missing topics)
        working-directory: server
        timeout-minutes: 5
        if: always()
        run: node knowledge-base-validator.js

      - name: Expand KB with missing topics (static content library)
        working-directory: server
        timeout-minutes: 5
        if: always()
        run: node knowledge-base-expander.js

      - name: Prepare commit data
        if: always()
        working-directory: server
        run: |
          # Get latest test results
          LATEST_RESULTS=$(ls -1t test_results/test_results_*.json 2>/dev/null | head -1)
          if [ -f "$LATEST_RESULTS" ]; then
            AVG_SCORE=$(jq '.summary.avgMatchScore' "$LATEST_RESULTS")
            ERROR_COUNT=$(jq '.summary.errors' "$LATEST_RESULTS")
            echo "AVG_SCORE=$AVG_SCORE" >> $GITHUB_ENV
            echo "ERROR_COUNT=$ERROR_COUNT" >> $GITHUB_ENV
          fi

      - name: Commit test results
        if: always()
        working-directory: server
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "QA Bot"
          git config user.email "qa@hakai.local"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"

          # Add test results (most recent)
          git add test_results/test_results_*.json 2>/dev/null || true
          git add test_results/analysis_*.json 2>/dev/null || true
          git add test_results/analysis_*.txt 2>/dev/null || true
          git add test_results/recommendations_*.json 2>/dev/null || true
          git add test_results/missing-questions.json 2>/dev/null || true
          git add test_results/kb-coverage-report.md 2>/dev/null || true
          git add generated_questions_*.json 2>/dev/null || true
          # Add any newly generated KB entries from auto-expansion
          git add data/ilmihal/*.json 2>/dev/null || true

          # Commit only if there are changes
          if ! git diff --cached --quiet; then
            git commit -m "📊 Daily QA Report: Avg ${AVG_SCORE}% | Errors: ${ERROR_COUNT}" \
              -m "Automated daily test run results with generated question variations." \
              -m "- Generated fresh questions across all topics" \
              -m "- Tested semantic matching accuracy" \
              -m "- Analyzed performance metrics" \
              -m "- Generated improvement recommendations"
            git push origin HEAD:main
          else
            echo "No changes to commit"
          fi

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-test-results
          path: server/test_results/
          retention-days: 30

      - name: Upload generated questions
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generated-questions
          path: server/generated_questions_*.json
          retention-days: 7

      - name: Post summary to GitHub
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            // Find latest test results
            const resultsDir = 'server/test_results';
            if (!fs.existsSync(resultsDir)) {
              console.log('No results directory');
              return;
            }

            const resultFiles = fs.readdirSync(resultsDir)
              .filter(f => f.startsWith('test_results_') && f.endsWith('.json'))
              .sort()
              .reverse();

            const analysisFiles = fs.readdirSync(resultsDir)
              .filter(f => f.startsWith('analysis_') && f.endsWith('.txt'))
              .sort()
              .reverse();

            if (resultFiles.length === 0) return;

            const results = JSON.parse(fs.readFileSync(path.join(resultsDir, resultFiles[0]), 'utf8'));

            let message = `# 🧪 Daily QA Test Results\n\n`;
            message += `📈 **Overall Metrics:**\n`;
            message += `- Tests: ${results.summary.successfulResponses}/${results.summary.totalTests}\n`;
            message += `- Avg Score: ${results.summary.avgMatchScore}%\n`;
            message += `- Avg Response: ${results.summary.avgResponseTime}ms\n`;
            message += `- Errors: ${results.summary.errors}\n\n`;

            if (results.criticalIssues.length > 0) {
              message += `⚠️  **Critical Issues:** ${results.criticalIssues.length}\n\n`;
            }

            if (analysisFiles.length > 0) {
              const analysis = fs.readFileSync(path.join(resultsDir, analysisFiles[0]), 'utf8');
              message += `\`\`\`\n${analysis.substring(0, 1000)}\n\`\`\`\n`;
            }

            // Post as workflow run summary
            console.log(message);

