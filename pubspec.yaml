name: kuran_uygulamasi
description: Android odakli Kur'an MVP uygulamasi.
publish_to: "none"
version: 1.1.0+7

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  dio: ^5.7.0
  http: ^1.2.2
  shared_preferences: ^2.3.2
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4
  flutter_timezone: ^1.0.8
  geolocator: ^13.0.1
  flutter_compass: ^0.8.0
  permission_handler: ^11.3.1
  intl: ^0.19.0
  path_provider: ^2.1.5
  share_plus: ^10.0.2
  url_launcher: ^6.3.1
  in_app_purchase: ^3.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/app/hakai_app_icon.png
  adaptive_icon_background: "#101A14"
  adaptive_icon_foreground: assets/app/qibla_icon.png
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/data/ayahs.json
    - assets/data/surahs.json
    - assets/data/duas.json
    - assets/data/full_quran/source_tr.json
    - assets/app/
